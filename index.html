        /* Responsive Masonry Layout */
        .masonry {

    <script>
        const modal = document.getElementById('video-modal');
        const modalVideo = document.getElementById('modal-video-player');

        function openVideoModal(url) {
            modalVideo.src = url;
            modal.style.display = 'flex';
            modalVideo.play();
            document.body.style.overflow = 'hidden';
        }

        function closeVideoModal() {
            modalVideo.pause();
            modalVideo.src = "";
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        modal.onclick = function(e) { if (e.target === modal) closeVideoModal(); };

        // Slider logic
        let currentSlide = 0;
        const slider = document.getElementById('image-slider');
        function updateSlider() {
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
            document.getElementById('dot-0').style.opacity = currentSlide === 0 ? '1' : '0.3';
            document.getElementById('dot-1').style.opacity = currentSlide === 1 ? '1' : '0.3';
        }
        function nextSlide() { currentSlide = (currentSlide + 1) % 2; updateSlider(); }
        function prevSlide() { currentSlide = (currentSlide - 1 + 2) % 2; updateSlider(); }
        setInterval(nextSlide, 5000);

        // --- IMPROVED ONE-BY-ONE VIDEO LOGIC ---
        let activeScrollVideo = null;

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                
                if (entry.isIntersecting) {
                    // If a different video is already playing from scroll, stop it
                    if (activeScrollVideo && activeScrollVideo !== video) {
                        activeScrollVideo.pause();
                        activeScrollVideo.closest('.video-container').classList.remove('is-playing');
                    }
                    
                    // Focus on this one
                    entry.target.classList.add('is-playing');
                    video.play().catch(() => {});
                    activeScrollVideo = video;
                } else {
                    // If this was the playing video and it scrolled out, pause it
                    if (activeScrollVideo === video) {
                        video.pause();
                        entry.target.classList.remove('is-playing');
                        activeScrollVideo = null;
                    }
                }
            });
        }, { 
            threshold: 0.7 // High threshold ensures we only play when it's clearly focused
        });

        window.onload = function() {
            document.querySelectorAll('.video-container').forEach(v => videoObserver.observe(v));
            revealSections();
        };

        window.onscroll = function() {
            const navbar = document.getElementById("navbar");
            if (window.pageYOffset > 50) {
                navbar.classList.add("nav-blur");
                navbar.classList.remove("py-6");
                navbar.classList.add("py-3");
            } else {
                navbar.classList.remove("nav-blur");
                navbar.classList.add("py-6");
                navbar.classList.remove("py-3");
            }
            revealSections();
        };

        function scrollToSection(id) {
            const element = document.getElementById(id);
            if (element) {
                const headerOffset = 80;
                const elementPosition = element.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: "smooth" });
            }
            closeMobileMenu();
        }

        function toggleVolume(btn) {
            const video = btn.closest('.video-container').querySelector('video');
            const icon = btn.querySelector('i');
            video.muted = !video.muted;
            icon.classList.toggle('fa-volume-xmark', video.muted);
            icon.classList.toggle('fa-volume-high', !video.muted);
        }

        function toggleMenu() {
            const menu = document.getElementById("mobile-menu");
            const icon = document.getElementById("menu-icon");
            const isOpen = !menu.classList.contains("translate-x-full");
            menu.classList.toggle("translate-x-full", isOpen);
            icon.classList.toggle("fa-bars", isOpen);
            icon.classList.toggle("fa-xmark", !isOpen);
            document.body.style.overflow = isOpen ? "auto" : "hidden";
        }

        function closeMobileMenu() {
            const menu = document.getElementById("mobile-menu");
            const icon = document.getElementById("menu-icon");
            if (menu) menu.classList.add("translate-x-full");
            if (icon) { icon.classList.remove("fa-xmark"); icon.classList.add("fa-bars"); }
            document.body.style.overflow = "auto";
        }

        function revealSections() {
            document.querySelectorAll(".reveal").forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 150) el.classList.add("active");
            });
        }
    </script>
</body>
</html>
